name: Deploy to GitHub Pages

# main ブランチへの push で自動デプロイ。手動実行も可能。
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1本に絞る（古い実行はキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Secrets がビルドジョブに届いているか検証（値は出さず長さのみ）。
      # 空ならキー無しでデプロイされるのを防ぐため明示的に失敗させる。
      - name: Verify required secrets
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: |
          echo "FIREBASE_API_KEY length: ${#VITE_FIREBASE_API_KEY}"
          echo "GEMINI_API_KEY length:   ${#VITE_GEMINI_API_KEY}"
          if [ -z "$VITE_GEMINI_API_KEY" ]; then
            echo "::error::VITE_GEMINI_API_KEY が空です。Settings > Secrets and variables > Actions の【Repository secrets】（Variables や Environment secrets ではない）に、名前を完全一致で登録してください。"
            exit 1
          fi

      - name: Build
        # Firebase 設定は GitHub Secrets から環境変数として注入する
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: |
          npm run build
          # 診断: ビルドステップが受け取ったキー長と、バンドルにキーが焼き込まれたかを配信ファイルに記録（値は出さない）
          echo "build_step_gemini_len=${#VITE_GEMINI_API_KEY}" > dist/diag.txt
          echo "gemini_chunk_has_key=$(grep -l 'AIza' dist/assets/gemini-*.js >/dev/null 2>&1 && echo yes || echo no)" >> dist/diag.txt
          cat dist/diag.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
